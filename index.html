<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="">
    <header class="bg-amber-200 min-h-screen w-full flex items-center justify-center" id="header">
        <!-- Login  -->
  <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-xl" id="card-body">
      <div class="card-body" >
        <fieldset class="fieldset">
            <img src="assets/Logo-full.png" alt="" class="mb-5">
          <label class="label">Account Number</label>
          <input type="text" class="input" id="account" placeholder="Enter Account Number" />
          <label class="label">4 Digit Pin</label>
          <input type="password" class="input" id="pin" placeholder="Password" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button class="btn btn-neutral mt-4" id="btn">Login</button>
        </fieldset>
      </div>
    </div>
         <!--  -->
    </header>
    <script src="index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Money</title>
    <link rel="stylesheet" href="style2.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-200 pt-1  cursor-pointer">
   <header id="header" class="max-w-[1150px] mx-auto mt-10">
    <section>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
            <img src="assets/logo.png" alt="" class="w-[100px]">
        <div>
            <h1 class="text-4xl font-bold">$ <span id="mainbalance">00</span></h1>
            <p>Available Blance</p>
        </div>
        </div>
        <button class="btn btn-neutral mt-4 text-2xl py-5" id="btn">LogOut</button>
        </div>
    </section>
    <section class="mt-14">
        <h1 class="text-4xl font-bold">Welcome To Payoo</h1>
        <p class="mt-10 text-2xl">
            Enjoy easy and convenient financial services  with us. <br> Cashout charge is low and 
        </p>
    </section>
    <section class="mt-14">
        <div class="grid grid-cols-3 gap-2 text-center">
            <!-- container -->
             <div class="border-green-300 border-2 py-5" id="card-six">
                <img src="assets/opt-1.png" alt="" class="mx-auto">
                <p class="mt-3">Add Money</p>
             </div>
             <div class="border-green-300 border-2 py-5" id="card-five">
                <img src="assets/opt-2.png" alt="" class="mx-auto">
                <p class="mt-3">CashOpu</p>
             </div>
             <div class="border-green-300 border-2 py-5" id="card-four">
                <img src="assets/opt-3.png" alt="" class="mx-auto">
                <p class="mt-3">Transfer Money</p>
             </div>
             <div class="border-green-300 border-2 py-5" id="card-three">
                <img src="assets/opt-4.png" alt="" class="mx-auto">
                <p class="mt-3">Get Bonus</p>
             </div>
             <div class="border-green-300 border-2 py-5" id="card-two">
                <img src="assets/opt-5.png" alt="" class="mx-auto">
                <p class="mt-3">Pay Bill</p>
             </div>
             <div class="border-green-300 border-2 py-5" id="card-one">
                <img src="assets/opt-6.png" alt="" class="mx-auto">
                <p class="mt-3">Transactions</p>
             </div>
        </div>
    </section>
    <section class="mt-14 flex items-center justify-center">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-xl">  
      <div class="card-body">
        <fieldset class="fieldset"> 
            <label class="label font-bold text-2xl mb-4">Add Money</label>
          <label class="label">Account Number</label>
          <input type="text" class="input" id="account" placeholder="Enter Account Number" />
           <label class="label">Amount</label>
          <input type="text" class="input" id="amount" placeholder="Enter Amount" />
          <label class="label">4 Digit Pin</label>
          <input type="password" class="input" id="pin" placeholder="Password" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button class="btn btn-neutral mt-4" id="add">Add Money</button>
        </fieldset>
      </div>
    </div>
    </section>
   </header>
   <footer class="h-[250px] w-[100%] bg-black mt-20">

   </footer>
    <script src="index2.js"></script>
</body>
</html>
